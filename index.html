<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DA Tracker</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #111111;
    --muted: #888888;
    --line: #e5e5e5;
    --line-strong: #cccccc;
    --accent: #2563eb;
    --soft: #f7f7f7;
    --danger: #b91c1c;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 15px;
    line-height: 1.5;
  }

  h1, h2, h3, h4, .helv {
    font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .nav button {
    background: none;
    border: 1px solid var(--line);
    padding: 6px 10px;
    cursor: pointer;
    font-size: 14px;
    border-radius: 4px;
    color: var(--fg);
  }
  .nav button:hover { background: var(--soft); }
  .date-label {
    font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    font-size: 18px;
    min-width: 220px;
    text-align: center;
  }
  .actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .actions button, .print-menu summary {
    background: none;
    border: 1px solid var(--line);
    padding: 6px 12px;
    cursor: pointer;
    font-size: 14px;
    border-radius: 4px;
    color: var(--fg);
    list-style: none;
  }
  .actions button:hover, .print-menu summary:hover { background: var(--soft); }
  .print-menu { position: relative; }
  .print-menu summary::-webkit-details-marker { display: none; }
  .print-menu[open] .print-dropdown {
    display: block;
  }
  .print-dropdown {
    display: none;
    position: absolute;
    right: 0;
    top: 100%;
    margin-top: 4px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 4px;
    z-index: 10;
    min-width: 140px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .print-dropdown button {
    display: block;
    width: 100%;
    text-align: left;
    border: none;
    border-radius: 0;
    padding: 8px 12px;
  }

  .wake {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
    font-size: 15px;
  }
  .wake-label {
    color: var(--muted);
  }
  .wake input {
    border: 1px solid var(--line);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 14px;
    font-family: inherit;
  }

  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin: 32px 0 12px;
    font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
  }

  .goals {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .goal {
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 12px;
  }
  .goal-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .goal-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    font-size: 18px;
  }
  .goal-row input {
    width: 60px;
    border: none;
    border-bottom: 1px solid var(--line-strong);
    font-size: 18px;
    font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    padding: 2px 4px;
    background: transparent;
  }
  .goal-row input:focus { outline: none; border-bottom-color: var(--accent); }
  .goal-unit { font-size: 13px; color: var(--muted); font-weight: 400; }
  .goal-progress {
    margin-top: 8px;
    font-size: 12px;
    color: var(--muted);
  }
  .bar {
    margin-top: 4px;
    height: 4px;
    background: var(--soft);
    border-radius: 2px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
  }
  .bar-fill.over { background: var(--danger); }

  .timer-block {
    margin: 32px 0 24px;
    text-align: center;
    padding: 24px;
    border: 1px solid var(--line);
    border-radius: 8px;
  }
  .timer-state {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .timer-display {
    font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    font-size: 56px;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
    font-variant-numeric: tabular-nums;
  }
  .timer-buttons {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .timer-btn {
    background: var(--fg);
    color: var(--bg);
    border: none;
    padding: 12px 36px;
    font-size: 14px;
    font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 4px;
  }
  .timer-btn:hover { opacity: 0.85; }
  .timer-btn.stop { background: var(--danger); }
  .timer-btn-secondary {
    background: none;
    color: var(--fg);
    border: 1px solid var(--line-strong);
    padding: 12px 24px;
    font-size: 14px;
    font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 4px;
  }
  .timer-btn-secondary:hover { background: var(--soft); }

  .distraction-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 24px 0;
    padding: 16px;
    border: 1px solid var(--line);
    border-radius: 8px;
  }
  .distraction-info {
    display: flex;
    flex-direction: column;
  }
  .distraction-count {
    font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    font-size: 28px;
    line-height: 1;
  }
  .distraction-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 4px;
  }
  .distraction-controls {
    display: flex;
    gap: 8px;
  }
  .distraction-controls button {
    border: 1px solid var(--line);
    background: none;
    width: 40px;
    height: 40px;
    border-radius: 4px;
    font-size: 20px;
    cursor: pointer;
    font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
  }
  .distraction-controls .plus {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
    width: 56px;
  }
  .distraction-controls button:hover { opacity: 0.85; }

  .sessions {
    margin-top: 8px;
  }
  .session-item, .break-item {
    padding: 10px 12px;
    border-bottom: 1px solid var(--line);
  }
  .session-item:last-child, .break-item:last-child { border-bottom: none; }
  .item-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .session-time {
    font-variant-numeric: tabular-nums;
  }
  .session-duration {
    font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    margin-left: auto;
    margin-right: 8px;
  }
  .session-difficulty {
    font-size: 12px;
    margin-right: 8px;
    font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
  }
  .session-difficulty.d1 { color: #16a34a; }
  .session-difficulty.d2 { color: #65a30d; }
  .session-difficulty.d3 { color: #ca8a04; }
  .session-difficulty.d4 { color: #ea580c; }
  .session-difficulty.d5 { color: #b91c1c; }
  .session-notes {
    margin-top: 6px;
    font-size: 13px;
    color: #444;
    white-space: pre-wrap;
    padding: 6px 8px;
    background: var(--soft);
    border-radius: 4px;
  }
  .break-item {
    color: var(--muted);
    font-size: 13px;
    padding-left: 24px;
    background: var(--soft);
  }
  .break-item .session-notes {
    background: var(--bg);
    color: #444;
  }
  .session-controls {
    display: flex;
    gap: 4px;
  }
  .session-controls button {
    background: none;
    border: 1px solid var(--line);
    width: 28px;
    height: 28px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
  }
  .session-controls button:hover { background: var(--bg); }
  .empty-state {
    color: var(--muted);
    font-size: 13px;
    padding: 16px;
    text-align: center;
    font-style: italic;
  }

  .after-da {
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 6px;
  }
  .after-da textarea {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 8px;
    font-family: inherit;
    font-size: 14px;
    resize: vertical;
    min-height: 60px;
  }

  .end-day-row {
    margin-top: 32px;
    text-align: center;
  }
  .end-day-btn {
    background: none;
    color: var(--fg);
    border: 1px solid var(--line-strong);
    padding: 10px 24px;
    font-size: 13px;
    font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 4px;
  }
  .end-day-btn:hover { background: var(--soft); }
  .day-ended-banner {
    margin-top: 16px;
    padding: 10px;
    background: var(--soft);
    border-radius: 4px;
    text-align: center;
    font-size: 13px;
    color: var(--muted);
  }

  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--bg);
    padding: 24px;
    border-radius: 8px;
    max-width: 460px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h3 {
    margin: 0 0 16px;
    font-size: 16px;
  }
  .modal-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 12px;
  }
  .modal-row label {
    font-size: 12px;
    color: var(--muted);
    font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .modal input, .modal textarea, .modal select {
    border: 1px solid var(--line);
    padding: 8px;
    border-radius: 4px;
    font-size: 14px;
    font-family: inherit;
  }
  .modal textarea {
    resize: vertical;
    min-height: 80px;
  }
  .difficulty-picker {
    display: flex;
    gap: 4px;
  }
  .difficulty-picker button {
    flex: 1;
    border: 1px solid var(--line);
    background: none;
    padding: 8px;
    border-radius: 4px;
    cursor: pointer;
    font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    font-size: 14px;
  }
  .difficulty-picker button.selected {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }
  .modal-buttons {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .modal-buttons button {
    border: 1px solid var(--line);
    background: var(--bg);
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
  }
  .modal-buttons .primary {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }
  .modal-buttons .danger {
    color: var(--danger);
  }

  .view { display: none; }
  .view.active { display: block; }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 14px;
  }
  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
  }
  .stat-value {
    font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    font-size: 22px;
  }
  .stat-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }
  .day-row {
    display: grid;
    grid-template-columns: 130px 1fr 1fr 1fr 1fr;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
    align-items: center;
    font-size: 13px;
  }
  .day-row:last-child { border-bottom: none; }
  .day-row.header {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
  }
  .day-row .day-link {
    cursor: pointer;
    color: var(--fg);
    text-decoration: none;
  }
  .day-row .day-link:hover { text-decoration: underline; }

  .data-controls {
    margin-top: 32px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .data-controls button {
    background: none;
    border: 1px solid var(--line);
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  .data-controls button:hover { background: var(--soft); }

  .prompt-item {
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 8px;
  }
  .prompt-item-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
  }
  .prompt-title {
    font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    font-size: 14px;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .prompt-actions {
    display: flex;
    gap: 4px;
  }
  .prompt-actions button {
    background: none;
    border: 1px solid var(--line);
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
  }
  .prompt-actions button:hover { background: var(--soft); }
  .prompt-actions .copy-btn {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
    font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .prompt-actions .copy-btn.copied {
    background: #16a34a;
    border-color: #16a34a;
  }
  .prompt-body-preview {
    font-size: 12px;
    color: var(--muted);
    white-space: pre-wrap;
    max-height: 60px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
  }
  .prompt-body-preview.expanded {
    max-height: none;
  }
  .prompt-body-preview:not(.expanded)::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 20px;
    background: linear-gradient(transparent, var(--bg));
  }

  @media (max-width: 600px) {
    .goals { grid-template-columns: 1fr; }
    .stat-grid { grid-template-columns: 1fr; }
    .day-row { grid-template-columns: 100px 1fr 1fr; font-size: 12px; }
    .day-row .hide-mobile { display: none; }
    .timer-display { font-size: 44px; }
  }
</style>
</head>
<body>

<div class="container">

  <div id="day-view" class="view active">
    <div class="topbar">
      <div class="nav">
        <button id="prev-day" title="Previous day">←</button>
        <div class="date-label" id="date-label">—</div>
        <button id="next-day" title="Next day">→</button>
      </div>
      <div class="actions">
        <button id="today-btn">Today</button>
        <button id="history-btn">History</button>
        <button id="prompts-btn">Prompts</button>
        <details class="print-menu">
          <summary>Print ▾</summary>
          <div class="print-dropdown">
            <button data-print="day">Print Day</button>
            <button data-print="week">Print Week</button>
            <button data-print="month">Print Month</button>
          </div>
        </details>
      </div>
    </div>

    <div class="wake">
      <span class="wake-label">Wake up:</span>
      <input type="time" id="wake-input">
    </div>

    <div class="section-title">Goals</div>
    <div class="goals">
      <div class="goal">
        <div class="goal-label">DA Time</div>
        <div class="goal-row">
          <input type="number" id="goal-da" min="0" step="0.25"> <span class="goal-unit">hrs</span>
        </div>
        <div class="goal-progress" id="da-progress">—</div>
        <div class="bar"><div class="bar-fill" id="da-bar" style="width:0%"></div></div>
      </div>
      <div class="goal">
        <div class="goal-label">Total Breaks</div>
        <div class="goal-row">
          <input type="number" id="goal-break-total" min="0" step="0.25"> <span class="goal-unit">hrs</span>
        </div>
        <div class="goal-progress" id="break-total-progress">—</div>
        <div class="bar"><div class="bar-fill" id="break-total-bar" style="width:0%"></div></div>
      </div>
      <div class="goal">
        <div class="goal-label">Per Break</div>
        <div class="goal-row">
          <input type="number" id="goal-break-per" min="0" step="1"> <span class="goal-unit">min</span>
        </div>
        <div class="goal-progress" id="break-per-progress">—</div>
      </div>
    </div>

    <div class="timer-block">
      <div class="timer-state" id="timer-state">Ready</div>
      <div class="timer-display" id="timer-display">00:00:00</div>
      <div class="timer-buttons">
        <button class="timer-btn" id="timer-btn">Start Session</button>
        <button class="timer-btn-secondary" id="cancel-btn" style="display:none;">Cancel</button>
      </div>
    </div>

    <div class="distraction-row">
      <div class="distraction-info">
        <div class="distraction-count" id="distraction-count">0</div>
        <div class="distraction-label">Distractions</div>
      </div>
      <div class="distraction-controls">
        <button id="dist-minus">−</button>
        <button class="plus" id="dist-plus">+1</button>
      </div>
    </div>

    <div style="display:flex; align-items:center; justify-content:space-between; margin: 32px 0 12px;">
      <div class="section-title" style="margin:0;">Sessions</div>
      <button id="add-session-btn" style="background:none; border:1px solid var(--line); padding:4px 10px; border-radius:4px; font-size:12px; cursor:pointer; font-family:Helvetica,Arial,sans-serif; font-weight:700; text-transform:uppercase; letter-spacing:0.05em;">+ Add Session</button>
    </div>
    <div class="sessions" id="sessions-list"></div>

    <div class="section-title">After DA</div>
    <div class="after-da">
      <textarea id="after-da-notes" placeholder="What did you do after you stopped working DA? e.g. went for a walk, made dinner, watched a show..."></textarea>
    </div>

    <div class="end-day-row">
      <button class="end-day-btn" id="end-day-btn">End Day</button>
      <div class="day-ended-banner" id="day-ended-banner" style="display:none;">
        Day ended. Breaks won't accrue further.
      </div>
    </div>
  </div>

  <div id="history-view" class="view">
    <div class="topbar">
      <div class="nav">
        <div class="date-label">All Time Stats</div>
      </div>
      <div class="actions">
        <button id="back-day-btn">← Back to Day</button>
      </div>
    </div>

    <div class="stat-grid" id="stat-grid"></div>

    <div class="section-title">Days</div>
    <div id="days-list"></div>

    <div class="data-controls">
      <button id="export-btn">Export JSON</button>
      <button id="import-btn">Import JSON</button>
      <input type="file" id="import-file" accept="application/json" style="display:none;">
      <button id="clear-btn">Clear All Data</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="edit-modal">
  <div class="modal">
    <h3 id="edit-modal-title">Edit Session</h3>
    <div class="modal-row" id="edit-time-row">
      <label>Start time</label>
      <input type="time" id="edit-start" step="1">
    </div>
    <div class="modal-row" id="edit-end-row">
      <label>End time</label>
      <input type="time" id="edit-end" step="1">

        <label>Title</label>
        <input type="text" id="prompt-title" placeholder="e.g. Rewrite for clarity">
      </div>

        <label>Prompt</label>
        <textarea id="prompt-body" placeholder="Paste or type the prompt here..." style="min-height:140px;"></textarea>
      </div>

        <button class="danger" id="prompt-delete">Delete</button>
        <button id="prompt-cancel">Cancel</button>
        <button class="primary" id="prompt-save">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'da-tracker-v1';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { days: {}, prompts: [] };
    const parsed = JSON.parse(raw);
    if (!parsed.prompts) parsed.prompts = [];
    return parsed;
  } catch (e) {
    return { days: {}, prompts: [] };
  }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let data = loadData();
let viewingDate = todayKey();
let currentView = 'day';
let activeTimerInterval = null;
let editingTarget = null;
let selectedDifficulty = null;

function todayKey() {
  return dateKey(new Date());
}

function dateKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function parseKey(key) {
  const [y, m, d] = key.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function shiftKey(key, days) {
  const d = parseKey(key);
  d.setDate(d.getDate() + days);
  return dateKey(d);
}

function formatDate(key) {
  const d = parseKey(key);
  return d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

function formatShortDate(key) {
  const d = parseKey(key);
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

function getDay(key) {
  if (!data.days[key]) {
    const goals = inheritGoals(key);
    data.days[key] = {
      wakeTime: null,
      goals: goals,
      sessions: [],
      breakNotes: {},
      afterDaNotes: '',
      distractions: 0,
      ended: false
    };
  }
  const d = data.days[key];
  if (!d.breakNotes) d.breakNotes = {};
  if (d.afterDaNotes === undefined) d.afterDaNotes = '';
  return d;
}

function inheritGoals(key) {
  const keys = Object.keys(data.days).filter(k => k < key && data.days[k].goals).sort().reverse();
  if (keys.length > 0) {
    return { ...data.days[keys[0]].goals };
  }
  return { daHours: 6, breakTotalHours: 1, breakPerMin: 15 };
}

function getActiveSession(day) {
  return day.sessions.find(s => !s.end);
}

function findActiveAnywhere() {
  for (const k of Object.keys(data.days)) {
    const a = getActiveSession(data.days[k]);
    if (a) return { dayKey: k, session: a };
  }
  return null;
}

function formatDuration(ms) {
  if (ms < 0) ms = 0;
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function formatDurationShort(ms) {
  if (ms < 0) ms = 0;
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  if (h === 0) return `${m}m`;
  if (m === 0) return `${h}h`;
  return `${h}h ${m}m`;
}

function formatTimeOfDay(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
}

function isoToTimeInput(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const h = String(d.getHours()).padStart(2, '0');
  const m = String(d.getMinutes()).padStart(2, '0');
  const s = String(d.getSeconds()).padStart(2, '0');
  return `${h}:${m}:${s}`;
}

function timeInputToIso(timeStr, dateKeyStr) {
  const [h, m, s] = timeStr.split(':').map(Number);
  const d = parseKey(dateKeyStr);
  d.setHours(h, m, s || 0, 0);
  return d.toISOString();
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function splitSessionsAtMidnight(sessions, dateKeyStr) {
  const dayStart = parseKey(dateKeyStr).getTime();
  const dayEnd = dayStart + 24 * 60 * 60 * 1000;
  return sessions.map(s => {
    const start = new Date(s.start).getTime();
    const end = s.end ? new Date(s.end).getTime() : Date.now();
    const clippedStart = Math.max(start, dayStart);
    const clippedEnd = Math.min(end, dayEnd);
    if (clippedEnd <= clippedStart) return null;
    return {
      id: s.id,
      start: new Date(clippedStart).toISOString(),
      end: s.end ? new Date(clippedEnd).toISOString() : null,
      notes: s.notes || '',
      difficulty: s.difficulty || null,
      _live: !s.end,
      _crossedStart: start < dayStart,
      _crossedEnd: end > dayEnd
    };
  }).filter(Boolean);
}

function computeBreaks(sessions) {
  const sorted = [...sessions].sort((a, b) => new Date(a.start) - new Date(b.start));
  const breaks = [];
  for (let i = 0; i < sorted.length - 1; i++) {
    const prev = sorted[i];
    const next = sorted[i + 1];
    if (!prev.end) continue;
    const gap = new Date(next.start) - new Date(prev.end);
    if (gap > 0) {
      breaks.push({
        prevId: prev.id,
        nextId: next.id,
        start: prev.end,
        end: next.start,
        duration: gap
      });
    }
  }
  return breaks;
}

function totalDaMs(sessions) {
  return sessions.reduce((sum, s) => {
    const end = s.end ? new Date(s.end) : new Date();
    return sum + (end - new Date(s.start));
  }, 0);
}

function totalBreakMs(breaks) {
  return breaks.reduce((sum, b) => sum + b.duration, 0);
}

function breakKey(prevId, nextId) {
  return `${prevId}->${nextId}`;
}

function render() {
  if (currentView === 'day') {
    renderDay();
  } else {
    renderHistory();
  }
}

function renderDay() {
  document.getElementById('day-view').classList.add('active');
  document.getElementById('history-view').classList.remove('active');

  document.getElementById('date-label').textContent = formatDate(viewingDate);

  const day = getDay(viewingDate);

  document.getElementById('wake-input').value = day.wakeTime || '';
  document.getElementById('goal-da').value = day.goals.daHours || '';
  document.getElementById('goal-break-total').value = day.goals.breakTotalHours || '';
  document.getElementById('goal-break-per').value = day.goals.breakPerMin || '';
  document.getElementById('after-da-notes').value = day.afterDaNotes || '';

  const allSessions = collectAllSessionsTouchingDate(viewingDate);
  const clipped = splitSessionsAtMidnight(allSessions, viewingDate);
  const breaks = computeBreaks(clipped);

  const daMs = totalDaMs(clipped);
  const breakMs = totalBreakMs(breaks);

  const daGoalMs = (day.goals.daHours || 0) * 3600000;
  document.getElementById('da-progress').textContent =
    `${formatDurationShort(daMs)} / ${day.goals.daHours || 0}h`;
  const daPct = daGoalMs > 0 ? Math.min(100, (daMs / daGoalMs) * 100) : 0;
  const daBar = document.getElementById('da-bar');
  daBar.style.width = daPct + '%';
  daBar.classList.remove('over');

  const breakGoalMs = (day.goals.breakTotalHours || 0) * 3600000;
  document.getElementById('break-total-progress').textContent =
    `${formatDurationShort(breakMs)} / ${day.goals.breakTotalHours || 0}h`;
  const breakPct = breakGoalMs > 0 ? Math.min(100, (breakMs / breakGoalMs) * 100) : 0;
  const breakBar = document.getElementById('break-total-bar');
  breakBar.style.width = breakPct + '%';
  breakBar.classList.toggle('over', breakGoalMs > 0 && breakMs > breakGoalMs);

  const breakPerGoalMs = (day.goals.breakPerMin || 0) * 60000;
  const overBreaks = breakPerGoalMs > 0 ? breaks.filter(b => b.duration > breakPerGoalMs).length : 0;
  const avgBreak = breaks.length > 0 ? breakMs / breaks.length : 0;
  document.getElementById('break-per-progress').textContent =
    breaks.length > 0
      ? `Avg ${formatDurationShort(avgBreak)} · ${overBreaks} over goal`
      : 'No breaks yet';

  document.getElementById('distraction-count').textContent = day.distractions || 0;

  renderTimer(day);
  renderSessionsList(clipped, breaks, day);

  document.getElementById('day-ended-banner').style.display = day.ended ? 'block' : 'none';
  document.getElementById('end-day-btn').style.display = day.ended ? 'none' : 'inline-block';
}

function collectAllSessionsTouchingDate(dateKeyStr) {
  const result = [];
  const day = data.days[dateKeyStr];
  if (day) result.push(...day.sessions);
  const prevKey = shiftKey(dateKeyStr, -1);
  const prev = data.days[prevKey];
  if (prev) {
    for (const s of prev.sessions) {
      const end = s.end ? new Date(s.end) : new Date();
      const dayStart = parseKey(dateKeyStr).getTime();
      if (end.getTime() > dayStart) {
        result.push(s);
      }
    }
  }
  return result;
}

function renderTimer(day) {
  const active = findActiveAnywhere();
  const stateEl = document.getElementById('timer-state');
  const displayEl = document.getElementById('timer-display');
  const btn = document.getElementById('timer-btn');
  const cancelBtn = document.getElementById('cancel-btn');

  if (activeTimerInterval) {
    clearInterval(activeTimerInterval);
    activeTimerInterval = null;
  }

  if (active) {
    stateEl.textContent = 'Working';
    btn.textContent = 'Stop Session';
    btn.classList.add('stop');
    cancelBtn.style.display = 'inline-block';
    const update = () => {
      const ms = Date.now() - new Date(active.session.start).getTime();
      displayEl.textContent = formatDuration(ms);
    };
    update();
    activeTimerInterval = setInterval(update, 1000);
  } else {
    cancelBtn.style.display = 'none';
    if (day.ended) {
      stateEl.textContent = 'Day Ended';
      displayEl.textContent = '00:00:00';
    } else {
      const completed = day.sessions.filter(s => s.end).sort((a, b) => new Date(b.end) - new Date(a.end));
      if (completed.length > 0 && viewingDate === todayKey()) {
        const last = completed[0];
        stateEl.textContent = 'On Break';
        const update = () => {
          const ms = Date.now() - new Date(last.end).getTime();
          displayEl.textContent = formatDuration(ms);
        };
        update();
        activeTimerInterval = setInterval(update, 1000);
      } else {
        stateEl.textContent = 'Ready';
        displayEl.textContent = '00:00:00';
      }
    }
    btn.textContent = 'Start Session';
    btn.classList.remove('stop');
  }
}

function renderSessionsList(sessions, breaks, day) {
  const list = document.getElementById('sessions-list');
  const sorted = [...sessions].sort((a, b) => new Date(a.start) - new Date(b.start));

  if (sorted.length === 0) {
    list.innerHTML = '<div class="empty-state">No sessions yet today.</div>';
    return;
  }

  let html = '';
  for (let i = 0; i < sorted.length; i++) {
    const s = sorted[i];
    const start = new Date(s.start);
    const end = s.end ? new Date(s.end) : new Date();
    const dur = end - start;
    const live = !s.end;
    const crossed = s._crossedStart || s._crossedEnd ? ' <span style="color:var(--muted);font-size:11px;">(midnight)</span>' : '';
    const editable = !live && !s._crossedStart && !s._crossedEnd;
    const diff = s.difficulty ? `<span class="session-difficulty d${s.difficulty}">D${s.difficulty}</span>` : '';
    const notes = s.notes ? `<div class="session-notes">${escapeHtml(s.notes)}</div>` : '';

    html += `
      <div class="session-item">
        <div class="item-row">
          <span class="session-time">${formatTimeOfDay(s.start)} – ${live ? '<em>now</em>' : formatTimeOfDay(s.end)}</span>${crossed}
          <span class="session-duration">${formatDurationShort(dur)}${live ? ' •' : ''}</span>
          ${diff}
          <div class="session-controls">
            ${editable ? `<button data-edit-session="${s.id}" title="Edit">✎</button>` : ''}
          </div>
        </div>
        ${notes}
      </div>
    `;
    if (i < sorted.length - 1) {
      const next = sorted[i + 1];
      const gap = new Date(next.start) - new Date(s.end || s.start);
      if (gap > 0 && s.end) {
        const perGoal = (day.goals.breakPerMin || 0) * 60000;
        const over = perGoal > 0 && gap > perGoal;
        const bk = breakKey(s.id, next.id);
        const bnote = day.breakNotes[bk] || '';
        const bnoteHtml = bnote ? `<div class="session-notes">${escapeHtml(bnote)}</div>` : '';
        html += `
          <div class="break-item">
            <div class="item-row">
              <span>Break</span>
              <span class="session-duration" style="${over ? 'color:var(--danger);' : ''}">${formatDurationShort(gap)}</span>
              <div class="session-controls">
                <button data-edit-break="${bk}" title="Edit break notes">✎</button>
              </div>
            </div>
            ${bnoteHtml}
          </div>
        `;
      }
    }
  }
  list.innerHTML = html;

  list.querySelectorAll('[data-edit-session]').forEach(btn => {
    btn.addEventListener('click', () => openEditSession(btn.getAttribute('data-edit-session')));
  });
  list.querySelectorAll('[data-edit-break]').forEach(btn => {
    btn.addEventListener('click', () => openEditBreak(btn.getAttribute('data-edit-break')));
  });
}

function renderHistory() {
  document.getElementById('day-view').classList.remove('active');
  document.getElementById('history-view').classList.add('active');

  const days = Object.keys(data.days).sort();
  const stats = computeAggregateStats();
  const grid = document.getElementById('stat-grid');

  if (days.length === 0) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;">No data yet.</div>';
    document.getElementById('days-list').innerHTML = '';
    return;
  }

  grid.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Avg Wake-Up</div>
      <div class="stat-value">${stats.avgWake || '—'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg DA Start</div>
      <div class="stat-value">${stats.avgDaStart || '—'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg DA / Day</div>
      <div class="stat-value">${stats.avgDa}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total DA Time</div>
      <div class="stat-value">${stats.totalDa}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Longest Session</div>
      <div class="stat-value">${stats.longestSession}</div>
      <div class="stat-sub">${stats.longestSessionDate || ''}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg Session</div>
      <div class="stat-value">${stats.avgSession}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg Break</div>
      <div class="stat-value">${stats.avgBreak}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg Difficulty</div>
      <div class="stat-value">${stats.avgDifficulty}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg Distractions / Day</div>
      <div class="stat-value">${stats.avgDistractions}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Most Productive Day</div>
      <div class="stat-value">${stats.bestDayDa}</div>
      <div class="stat-sub">${stats.bestDayDate || ''}</div>
    </div>
  `;

  const sortedDesc = [...days].sort().reverse();
  let html = `
    <div class="day-row header">
      <div>Date</div>
      <div>Wake</div>
      <div>DA Time</div>
      <div class="hide-mobile">Sessions</div>
      <div class="hide-mobile">Distractions</div>
    </div>
  `;
  for (const k of sortedDesc) {
    const d = data.days[k];
    const allSessions = collectAllSessionsTouchingDate(k);
    const clipped = splitSessionsAtMidnight(allSessions, k);
    const daMs = totalDaMs(clipped);
    html += `
      <div class="day-row">
        <a class="day-link" data-jump="${k}">${formatShortDate(k)}</a>
        <div>${d.wakeTime || '—'}</div>
        <div>${formatDurationShort(daMs)}</div>
        <div class="hide-mobile">${clipped.length}</div>
        <div class="hide-mobile">${d.distractions || 0}</div>
      </div>
    `;
  }
  document.getElementById('days-list').innerHTML = html;
  document.querySelectorAll('[data-jump]').forEach(a => {
    a.addEventListener('click', () => {
      viewingDate = a.getAttribute('data-jump');
      currentView = 'day';
      render();
    });
  });
}

function computeAggregateStats() {
  const days = Object.keys(data.days).sort();
  if (days.length === 0) return {};

  let wakeMinutes = [];
  let daStartMinutes = [];
  let daMsList = [];
  let sessionDurations = [];
  let breakDurations = [];
  let distractions = [];
  let difficulties = [];
  let longest = 0, longestDate = '';
  let bestDayMs = 0, bestDayKey = '';

  for (const k of days) {
    const d = data.days[k];
    if (d.wakeTime) {
      const [h, m] = d.wakeTime.split(':').map(Number);
      wakeMinutes.push(h * 60 + m);
    }
    const all = collectAllSessionsTouchingDate(k);
    const clipped = splitSessionsAtMidnight(all, k);
    const sorted = [...clipped].sort((a, b) => new Date(a.start) - new Date(b.start));

    if (sorted.length > 0) {
      const first = new Date(sorted[0].start);
      daStartMinutes.push(first.getHours() * 60 + first.getMinutes());
    }

    const daMs = totalDaMs(clipped);
    daMsList.push(daMs);
    if (daMs > bestDayMs) { bestDayMs = daMs; bestDayKey = k; }

    for (const s of sorted) {
      const end = s.end ? new Date(s.end) : new Date();
      const dur = end - new Date(s.start);
      sessionDurations.push(dur);
      if (dur > longest) { longest = dur; longestDate = k; }
      if (s.difficulty) difficulties.push(s.difficulty);
    }

    const breaks = computeBreaks(sorted);
    for (const b of breaks) breakDurations.push(b.duration);

    distractions.push(d.distractions || 0);
  }

  const avg = arr => arr.length === 0 ? 0 : arr.reduce((a,b) => a+b, 0) / arr.length;
  const minutesToTime = mins => {
    const h = Math.floor(mins / 60) % 24;
    const m = Math.floor(mins % 60);
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 === 0 ? 12 : h % 12;
    return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
  };

  return {
    avgWake: wakeMinutes.length ? minutesToTime(avg(wakeMinutes)) : '',
    avgDaStart: daStartMinutes.length ? minutesToTime(avg(daStartMinutes)) : '',
    avgDa: formatDurationShort(avg(daMsList)),
    totalDa: formatDurationShort(daMsList.reduce((a,b)=>a+b,0)),
    longestSession: formatDurationShort(longest),
    longestSessionDate: longestDate ? formatShortDate(longestDate) : '',
    avgSession: sessionDurations.length ? formatDurationShort(avg(sessionDurations)) : '—',
    avgBreak: breakDurations.length ? formatDurationShort(avg(breakDurations)) : '—',
    avgDifficulty: difficulties.length ? avg(difficulties).toFixed(1) : '—',
    avgDistractions: distractions.length ? (avg(distractions)).toFixed(1) : '0',
    bestDayDa: formatDurationShort(bestDayMs),
    bestDayDate: bestDayKey ? formatShortDate(bestDayKey) : ''
  };
}

function startSession() {
  const day = getDay(viewingDate);
  if (day.ended) return;
  if (findActiveAnywhere()) return;
  const id = 's_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
  day.sessions.push({ id, start: new Date().toISOString(), end: null, notes: '', difficulty: null });
  saveData(data);
  render();
}

function stopSession() {
  const active = findActiveAnywhere();
  if (!active) return;

  const startDate = new Date(active.session.start);
  const now = new Date();
  const startKey = dateKey(startDate);
  const endKey = dateKey(now);

  let primarySessionId = active.session.id;

  if (startKey !== endKey) {
    const segments = [];
    let cur = new Date(startDate);
    while (true) {
      const dayEndOfCur = new Date(cur);
      dayEndOfCur.setHours(24, 0, 0, 0);
      if (dayEndOfCur <= now) {
        segments.push({ start: cur.toISOString(), end: dayEndOfCur.toISOString() });
        cur = new Date(dayEndOfCur);
      } else {
        segments.push({ start: cur.toISOString(), end: now.toISOString() });
        break;
      }
    }
    active.session.end = segments[0].end;
    for (let i = 1; i < segments.length; i++) {
      const seg = segments[i];
      const segDayKey = dateKey(new Date(seg.start));
      const segDay = getDay(segDayKey);
      const id = 's_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7) + '_' + i;
      segDay.sessions.push({ id, start: seg.start, end: seg.end, notes: '', difficulty: null });
      if (i === segments.length - 1) {
        primarySessionId = id;
      }
    }
  } else {
    active.session.end = now.toISOString();
  }

  saveData(data);
  render();
  openEditSession(primarySessionId, true);
}

function cancelSession() {
  const active = findActiveAnywhere();
  if (!active) return;
  if (!confirm('Cancel this active session? It will be removed entirely.')) return;
  data.days[active.dayKey].sessions = data.days[active.dayKey].sessions.filter(s => s.id !== active.session.id);
  saveData(data);
  render();
}

function addManualSession() {
  const day = getDay(viewingDate);
  // Default to a 1-hour block. If viewing today, use one hour ago to now. Otherwise, noon-1pm.
  let startDate, endDate;
  if (viewingDate === todayKey()) {
    endDate = new Date();
    startDate = new Date(endDate.getTime() - 60 * 60 * 1000);
  } else {
    startDate = parseKey(viewingDate);
    startDate.setHours(12, 0, 0, 0);
    endDate = new Date(startDate.getTime() + 60 * 60 * 1000);
  }
  const id = 's_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
  day.sessions.push({
    id,
    start: startDate.toISOString(),
    end: endDate.toISOString(),
    notes: '',
    difficulty: null
  });
  saveData(data);
  render();
  // Open the edit modal so user can adjust times immediately
  openEditSession(id, false);
}

function addDistraction(delta) {
  const day = getDay(viewingDate);
  day.distractions = Math.max(0, (day.distractions || 0) + delta);
  saveData(data);
  render();
}

function endDay() {
  const active = findActiveAnywhere();
  if (active) stopSessionSilent();
  const day = getDay(viewingDate);
  day.ended = true;
  saveData(data);
  render();
}

function stopSessionSilent() {
  const active = findActiveAnywhere();
  if (!active) return;
  const startDate = new Date(active.session.start);
  const now = new Date();
  const startKey = dateKey(startDate);
  const endKey = dateKey(now);
  if (startKey !== endKey) {
    const segments = [];
    let cur = new Date(startDate);
    while (true) {
      const dayEndOfCur = new Date(cur);
      dayEndOfCur.setHours(24, 0, 0, 0);
      if (dayEndOfCur <= now) {
        segments.push({ start: cur.toISOString(), end: dayEndOfCur.toISOString() });
        cur = new Date(dayEndOfCur);
      } else {
        segments.push({ start: cur.toISOString(), end: now.toISOString() });
        break;
      }
    }
    active.session.end = segments[0].end;
    for (let i = 1; i < segments.length; i++) {
      const seg = segments[i];
      const segDayKey = dateKey(new Date(seg.start));
      const segDay = getDay(segDayKey);
      const id = 's_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7) + '_' + i;
      segDay.sessions.push({ id, start: seg.start, end: seg.end, notes: '', difficulty: null });
    }
  } else {
    active.session.end = now.toISOString();
  }
  saveData(data);
}

function openEditSession(sessionId, isStopping) {
  for (const k of Object.keys(data.days)) {
    const s = data.days[k].sessions.find(s => s.id === sessionId);
    if (s) {
      editingTarget = { type: 'session', dayKey: k, id: sessionId, isStopping: !!isStopping };
      document.getElementById('edit-modal-title').textContent = isStopping ? 'Session Complete' : 'Edit Session';
      document.getElementById('edit-time-row').style.display = isStopping ? 'none' : 'flex';
      document.getElementById('edit-end-row').style.display = isStopping ? 'none' : 'flex';
      document.getElementById('edit-difficulty-row').style.display = 'flex';
      document.getElementById('edit-notes-label').textContent = 'How did it go?';
      document.getElementById('edit-notes').placeholder = 'What you worked on, how it went, blockers, anything notable...';
      document.getElementById('edit-start').value = isoToTimeInput(s.start);
      document.getElementById('edit-end').value = s.end ? isoToTimeInput(s.end) : '';
      document.getElementById('edit-notes').value = s.notes || '';
      selectedDifficulty = s.difficulty || null;
      updateDifficultyPicker();
      document.getElementById('edit-delete').style.display = isStopping ? 'none' : 'inline-block';
      document.getElementById('edit-modal').classList.add('show');
      setTimeout(() => document.getElementById('edit-notes').focus(), 50);
      return;
    }
  }
}

function openEditBreak(bkey) {
  const day = getDay(viewingDate);
  editingTarget = { type: 'break', dayKey: viewingDate, id: bkey, isStopping: false };
  document.getElementById('edit-modal-title').textContent = 'Break Notes';
  document.getElementById('edit-time-row').style.display = 'none';
  document.getElementById('edit-end-row').style.display = 'none';
  document.getElementById('edit-difficulty-row').style.display = 'none';
  document.getElementById('edit-notes-label').textContent = 'What did you do on this break?';
  document.getElementById('edit-notes').placeholder = 'e.g. ate lunch, walked, scrolled, called someone...';
  document.getElementById('edit-notes').value = day.breakNotes[bkey] || '';
  document.getElementById('edit-delete').style.display = 'none';
  document.getElementById('edit-modal').classList.add('show');
  setTimeout(() => document.getElementById('edit-notes').focus(), 50);
}

function updateDifficultyPicker() {
  document.querySelectorAll('#difficulty-picker button').forEach(btn => {
    btn.classList.toggle('selected', String(selectedDifficulty) === btn.getAttribute('data-diff'));
  });
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('show');
  editingTarget = null;
  selectedDifficulty = null;
}

function saveEdit() {
  if (!editingTarget) return;
  if (editingTarget.type === 'session') {
    const day = data.days[editingTarget.dayKey];
    const s = day.sessions.find(s => s.id === editingTarget.id);
    if (!s) return;
    if (!editingTarget.isStopping) {
      const startStr = document.getElementById('edit-start').value;
      const endStr = document.getElementById('edit-end').value;
      if (!startStr || !endStr) {
        alert('Both start and end times required.');
        return;
      }
      const newStart = timeInputToIso(startStr, editingTarget.dayKey);
      const newEnd = timeInputToIso(endStr, editingTarget.dayKey);
      if (new Date(newEnd) <= new Date(newStart)) {
        alert('End must be after start.');
        return;
      }
      // Check for overlap with other sessions on the same day
      const newStartMs = new Date(newStart).getTime();
      const newEndMs = new Date(newEnd).getTime();
      const others = day.sessions.filter(o => o.id !== s.id && o.end);
      const overlap = others.find(o => {
        const oStart = new Date(o.start).getTime();
        const oEnd = new Date(o.end).getTime();
        return newStartMs < oEnd && newEndMs > oStart;
      });
      if (overlap) {
        alert(`This session overlaps with another session (${formatTimeOfDay(overlap.start)} – ${formatTimeOfDay(overlap.end)}). Adjust the times.`);
        return;
      }
      s.start = newStart;
      s.end = newEnd;
    }
    s.notes = document.getElementById('edit-notes').value;
    s.difficulty = selectedDifficulty;
  } else if (editingTarget.type === 'break') {
    const day = getDay(editingTarget.dayKey);
    const note = document.getElementById('edit-notes').value;
    if (note.trim()) {
      day.breakNotes[editingTarget.id] = note;
    } else {
      delete day.breakNotes[editingTarget.id];
    }
  }
  saveData(data);
  closeEditModal();
  render();
}

function deleteSession() {
  if (!editingTarget || editingTarget.type !== 'session') return;
  if (!confirm('Delete this session?')) return;
  const day = data.days[editingTarget.dayKey];
  day.sessions = day.sessions.filter(s => s.id !== editingTarget.id);
  saveData(data);
  closeEditModal();
  render();
}

function updateGoal(field, value) {
  const day = getDay(viewingDate);
  const num = parseFloat(value);
  day.goals[field] = isNaN(num) ? 0 : num;
  saveData(data);
  renderDay();
}

function updateWake(value) {
  const day = getDay(viewingDate);
  day.wakeTime = value || null;
  saveData(data);
}

function updateAfterDaNotes(value) {
  const day = getDay(viewingDate);
  day.afterDaNotes = value;
  saveData(data);
}

function checkWakePrompt() {
  const today = todayKey();
  const day = data.days[today];
  const priorDays = Object.keys(data.days).filter(k => k < today);
  if (priorDays.length > 0 && (!day || !day.wakeTime)) {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('wake-modal-input').value = `${h}:${m}`;
    document.getElementById('wake-modal').classList.add('show');
  }
}

function printRange(range) {
  if (range === 'day') {
    printSingleDay(viewingDate);
    return;
  }
  printSummary(range);
}

function buildSessionRowsHtml(dateKeyStr) {
  const all = collectAllSessionsTouchingDate(dateKeyStr);
  const clipped = splitSessionsAtMidnight(all, dateKeyStr);
  const sorted = [...clipped].sort((a, b) => new Date(a.start) - new Date(b.start));
  const day = data.days[dateKeyStr];
  if (sorted.length === 0) return '<div style="color:#888; font-style:italic;">No sessions.</div>';
  let html = '';
  for (let i = 0; i < sorted.length; i++) {
    const s = sorted[i];
    const start = new Date(s.start);
    const end = s.end ? new Date(s.end) : new Date();
    const dur = end - start;
    const diff = s.difficulty ? ` · D${s.difficulty}` : '';
    html += `
      <div style="border-bottom:1px solid #eee; padding:8px 0;">
        <div style="display:flex; gap:12px; align-items:baseline;">
          <strong style="font-family:Helvetica,Arial,sans-serif;">${formatTimeOfDay(s.start)} – ${s.end ? formatTimeOfDay(s.end) : '<em>active</em>'}</strong>
          <span style="font-family:Helvetica,Arial,sans-serif; font-weight:700;">${formatDurationShort(dur)}</span>
          <span style="color:#666; font-size:11px;">${diff}</span>
        </div>
        ${s.notes ? `<div style="margin-top:4px; padding:6px 8px; background:#f7f7f7; border-radius:3px; font-size:11px; white-space:pre-wrap;">${escapeHtml(s.notes)}</div>` : ''}
      </div>
    `;
    if (i < sorted.length - 1 && day) {
      const next = sorted[i + 1];
      const gap = new Date(next.start) - new Date(s.end || s.start);
      if (gap > 0 && s.end) {
        const bk = breakKey(s.id, next.id);
        const bnote = day.breakNotes && day.breakNotes[bk];
        html += `
          <div style="background:#f7f7f7; padding:6px 12px; font-size:11px; color:#666;">
            <strong>Break · ${formatDurationShort(gap)}</strong>
            ${bnote ? `<div style="margin-top:3px; color:#333; white-space:pre-wrap;">${escapeHtml(bnote)}</div>` : ''}
          </div>
        `;
      }
    }
  }
  return html;
}

function printSummary(range) {
  const ref = parseKey(viewingDate);
  let startDate, endDate, label;
  if (range === 'week') {
    const dow = ref.getDay();
    startDate = new Date(ref); startDate.setDate(ref.getDate() - dow);
    endDate = new Date(startDate); endDate.setDate(startDate.getDate() + 6);
    label = `Week of ${startDate.toLocaleDateString(undefined, {month:'short', day:'numeric'})} – ${endDate.toLocaleDateString(undefined, {month:'short', day:'numeric', year:'numeric'})}`;
  } else {
    startDate = new Date(ref.getFullYear(), ref.getMonth(), 1);
    endDate = new Date(ref.getFullYear(), ref.getMonth() + 1, 0);
    label = startDate.toLocaleDateString(undefined, {month:'long', year:'numeric'});
  }

  const keys = [];
  for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
    keys.push(dateKey(d));
  }

  let totalDa = 0, totalBreak = 0, totalDist = 0, sessions = 0, daysWithData = 0;
  let longest = 0, longestDate = '';
  let difficulties = [];
  const rows = [];
  const dayDetails = [];
  for (const k of keys) {
    if (!data.days[k]) continue;
    daysWithData++;
    const all = collectAllSessionsTouchingDate(k);
    const clipped = splitSessionsAtMidnight(all, k);
    const daMs = totalDaMs(clipped);
    const breaks = computeBreaks(clipped);
    const breakMs = totalBreakMs(breaks);
    totalDa += daMs;
    totalBreak += breakMs;
    totalDist += data.days[k].distractions || 0;
    sessions += clipped.length;
    for (const s of clipped) {
      const dur = (s.end ? new Date(s.end) : new Date()) - new Date(s.start);
      if (dur > longest) { longest = dur; longestDate = k; }
      if (s.difficulty) difficulties.push(s.difficulty);
    }
    rows.push({
      key: k,
      wake: data.days[k].wakeTime || '—',
      da: daMs,
      breaks: breakMs,
      sessions: clipped.length,
      distractions: data.days[k].distractions || 0
    });
    dayDetails.push(k);
  }

  const avgDa = daysWithData ? totalDa / daysWithData : 0;
  const avgDifficulty = difficulties.length ? (difficulties.reduce((a,b)=>a+b,0) / difficulties.length).toFixed(1) : '—';

  const detailHtml = dayDetails.map(k => {
    const d = data.days[k];
    return `
      <div style="margin-top: 24px; padding-top: 12px; border-top: 2px solid #ddd; page-break-inside: avoid;">
        <h3 style="font-family:Helvetica,Arial,sans-serif; margin: 0 0 6px; font-size:14px;">${formatDate(k)}</h3>
        <div style="font-size:11px; color:#666; margin-bottom:8px;">
          Wake: ${d.wakeTime || '—'} · Distractions: ${d.distractions || 0}
        </div>
        ${buildSessionRowsHtml(k)}
        ${d.afterDaNotes && d.afterDaNotes.trim() ? `
          <div style="margin-top: 10px;">
            <div style="font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:#888; font-family:Helvetica,Arial,sans-serif; font-weight:700; margin-bottom:4px;">After DA</div>
            <div style="padding:8px; background:#f7f7f7; border-radius:3px; font-size:11px; white-space:pre-wrap;">${escapeHtml(d.afterDaNotes)}</div>
          </div>
        ` : ''}
      </div>
    `;
  }).join('');

  const win = window.open('', '_blank');
  win.document.write(`
    <!DOCTYPE html><html><head><title>${label} — DA Tracker</title>
    <style>
      @page { margin: 0.5in; size: letter; }
      body { font-family: -apple-system, sans-serif; color: #111; margin: 0; padding: 24px; font-size: 12px; line-height: 1.5; }
      h1, h2, h3 { font-family: Helvetica, Arial, sans-serif; }
      h1 { margin: 0 0 4px; font-size: 22px; }
      h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; color: #888; margin: 24px 0 8px; }
      .sub { color: #666; margin-bottom: 20px; font-size: 13px; }
      .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
      .card { border: 1px solid #ddd; padding: 10px; border-radius: 4px; }
      .label { font-size: 10px; text-transform: uppercase; color: #888; letter-spacing: 0.1em; font-family: Helvetica, Arial, sans-serif; }
      .value { font-family: Helvetica, Arial, sans-serif; font-weight: 700; font-size: 18px; margin-top: 4px; }
      table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 16px; }
      th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #eee; }
      th { font-family: Helvetica, Arial, sans-serif; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: #888; }
    </style></head><body>
    <h1>DA Tracker — ${range === 'week' ? 'Weekly' : 'Monthly'} Summary</h1>
    <div class="sub">${label}</div>
    <div class="grid">
      <div class="card"><div class="label">Total DA</div><div class="value">${formatDurationShort(totalDa)}</div></div>
      <div class="card"><div class="label">Avg DA / Day</div><div class="value">${formatDurationShort(avgDa)}</div></div>
      <div class="card"><div class="label">Total Breaks</div><div class="value">${formatDurationShort(totalBreak)}</div></div>
      <div class="card"><div class="label">Sessions</div><div class="value">${sessions}</div></div>
      <div class="card"><div class="label">Distractions</div><div class="value">${totalDist}</div></div>
      <div class="card"><div class="label">Longest Session</div><div class="value">${formatDurationShort(longest)}</div></div>
      <div class="card"><div class="label">Avg Difficulty</div><div class="value">${avgDifficulty}</div></div>
      <div class="card"><div class="label">Days Tracked</div><div class="value">${daysWithData} / ${keys.length}</div></div>
    </div>
    <h2>Daily Breakdown</h2>
    <table>
      <thead><tr><th>Date</th><th>Wake</th><th>DA</th><th>Breaks</th><th>Sessions</th><th>Distractions</th></tr></thead>
      <tbody>
        ${rows.map(r => `<tr>
          <td>${formatShortDate(r.key)}</td>
          <td>${r.wake}</td>
          <td>${formatDurationShort(r.da)}</td>
          <td>${formatDurationShort(r.breaks)}</td>
          <td>${r.sessions}</td>
          <td>${r.distractions}</td>
        </tr>`).join('')}
      </tbody>
    </table>
    <h2>Session &amp; Break Details</h2>
    ${detailHtml || '<div style="color:#888; font-style:italic;">No sessions in this range.</div>'}
    <script>window.onload = () => setTimeout(() => window.print(), 300);<\/script>
    </body></html>
  `);
  win.document.close();
}

// ===== Prompts =====
let editingPromptId = null;
let promptSearchTerm = '';

function openPromptsModal() {
  promptSearchTerm = '';
  document.getElementById('prompts-search').value = '';
  document.getElementById('prompt-edit-form').style.display = 'none';
  editingPromptId = null;
  renderPromptsList();
  document.getElementById('prompts-modal').classList.add('show');
}

function closePromptsModal() {
  document.getElementById('prompts-modal').classList.remove('show');
  editingPromptId = null;
}

function renderPromptsList() {
  const list = document.getElementById('prompts-list');
  const term = promptSearchTerm.toLowerCase().trim();
  const filtered = (data.prompts || []).filter(p => {
    if (!term) return true;
    return (p.title || '').toLowerCase().includes(term) ||
           (p.body || '').toLowerCase().includes(term);
  });

  if (filtered.length === 0) {
    if ((data.prompts || []).length === 0) {
      list.innerHTML = '<div class="empty-state">No prompts saved yet. Click + New to add one.</div>';
    } else {
      list.innerHTML = '<div class="empty-state">No prompts match your search.</div>';
    }
    return;
  }

  list.innerHTML = filtered.map(p => `
    <div class="prompt-item" data-id="${p.id}">
      <div class="prompt-item-header">
        <div class="prompt-title">${escapeHtml(p.title || 'Untitled')}</div>
        <div class="prompt-actions">
          <button class="copy-btn" data-copy="${p.id}">Copy</button>
          <button data-edit-prompt="${p.id}" title="Edit">✎</button>
        </div>
      </div>
      <div class="prompt-body-preview" data-toggle="${p.id}">${escapeHtml(p.body || '')}</div>
    </div>
  `).join('');

  list.querySelectorAll('[data-copy]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      copyPrompt(btn.getAttribute('data-copy'), btn);
    });
  });
  list.querySelectorAll('[data-edit-prompt]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      openPromptEdit(btn.getAttribute('data-edit-prompt'));
    });
  });
  list.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', () => el.classList.toggle('expanded'));
  });
}

function copyPrompt(id, btn) {
  const p = data.prompts.find(p => p.id === id);
  if (!p) return;
  const text = p.body || '';
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showCopied(btn));
  } else {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showCopied(btn); }
    catch (e) { alert('Copy failed.'); }
    document.body.removeChild(ta);
  }
}

function showCopied(btn) {
  const original = btn.textContent;
  btn.textContent = 'Copied';
  btn.classList.add('copied');
  setTimeout(() => {
    btn.textContent = original;
    btn.classList.remove('copied');
  }, 1200);
}

function openPromptEdit(id) {
  editingPromptId = id;
  const form = document.getElementById('prompt-edit-form');
  form.style.display = 'block';
  if (id === 'new') {
    document.getElementById('prompt-title').value = '';
    document.getElementById('prompt-body').value = '';
    document.getElementById('prompt-delete').style.display = 'none';
  } else {
    const p = data.prompts.find(p => p.id === id);
    if (!p) return;
    document.getElementById('prompt-title').value = p.title || '';
    document.getElementById('prompt-body').value = p.body || '';
    document.getElementById('prompt-delete').style.display = 'inline-block';
  }
  setTimeout(() => document.getElementById('prompt-title').focus(), 50);
  // Scroll form into view
  form.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function savePrompt() {
  const title = document.getElementById('prompt-title').value.trim();
  const body = document.getElementById('prompt-body').value;
  if (!title && !body.trim()) {
    alert('Add a title or prompt body.');
    return;
  }
  if (!data.prompts) data.prompts = [];
  if (editingPromptId === 'new') {
    const id = 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
    data.prompts.push({ id, title: title || 'Untitled', body });
  } else {
    const p = data.prompts.find(p => p.id === editingPromptId);
    if (p) {
      p.title = title || 'Untitled';
      p.body = body;
    }
  }
  saveData(data);
  document.getElementById('prompt-edit-form').style.display = 'none';
  editingPromptId = null;
  renderPromptsList();
}

function deletePrompt() {
  if (!editingPromptId || editingPromptId === 'new') return;
  if (!confirm('Delete this prompt?')) return;
  data.prompts = data.prompts.filter(p => p.id !== editingPromptId);
  saveData(data);
  document.getElementById('prompt-edit-form').style.display = 'none';
  editingPromptId = null;
  renderPromptsList();
}

function exportJson() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `da-tracker-${todayKey()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importJson(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.days) throw new Error('Invalid format');
      if (!imported.prompts) imported.prompts = [];
      if (!confirm('This will replace all current data. Continue?')) return;
      data = imported;
      saveData(data);
      render();
    } catch (err) {
      alert('Import failed: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function clearAll() {
  if (!confirm('Delete all tracking data? This cannot be undone.')) return;
  if (!confirm('Are you sure? This is permanent.')) return;
  data = { days: {}, prompts: [] };
  saveData(data);
  viewingDate = todayKey();
  render();
}

document.getElementById('prev-day').addEventListener('click', () => {
  viewingDate = shiftKey(viewingDate, -1);
  render();
});
document.getElementById('next-day').addEventListener('click', () => {

  render();
});
document.getElementById('today-btn').addEventListener('click', () => {
  viewingDate = todayKey();
  currentView = 'day';
  render();
});
document.getElementById('history-btn').addEventListener('click', () => {
  currentView = 'history';
  render();
});

document.getElementById('prompts-btn').addEventListener('click', openPromptsModal);
document.getElementById('prompts-close').addEventListener('click', closePromptsModal);
document.getElementById('prompts-add-btn').addEventListener('click', () => openPromptEdit('new'));
document.getElementById('prompt-cancel').addEventListener('click', () => {
  document.getElementById('prompt-edit-form').style.display = 'none';
  editingPromptId = null;
});
document.getElementById('prompt-save').addEventListener('click', savePrompt);
document.getElementById('prompt-delete').addEventListener('click', deletePrompt);
document.getElementById('prompts-search').addEventListener('input', e => {
  promptSearchTerm = e.target.value;
  renderPromptsList();
});
document.getElementById('back-day-btn').addEventListener('click', () => {
  currentView = 'day';
  render();
});

document.getElementById('timer-btn').addEventListener('click', () => {
  if (viewingDate !== todayKey() && !findActiveAnywhere()) {
    if (!confirm('You are viewing a past/future day. Jump to today to start a session?')) return;
    viewingDate = todayKey();
    render();
    return;
  }
  if (findActiveAnywhere()) {
    stopSession();
  } else {
    startSession();
  }
});

document.getElementById('cancel-btn').addEventListener('click', cancelSession);

document.getElementById('add-session-btn').addEventListener('click', addManualSession);

document.getElementById('dist-plus').addEventListener('click', () => addDistraction(1));
document.getElementById('dist-minus').addEventListener('click', () => addDistraction(-1));

document.getElementById('end-day-btn').addEventListener('click', () => {
  if (confirm('End the day? This stops any active session and prevents the gap until your next session from being counted as a break.')) {
    endDay();
  }
});

document.getElementById('wake-input').addEventListener('change', e => updateWake(e.target.value));

document.getElementById('goal-da').addEventListener('change', e => updateGoal('daHours', e.target.value));
document.getElementById('goal-break-total').addEventListener('change', e => updateGoal('breakTotalHours', e.target.value));
document.getElementById('goal-break-per').addEventListener('change', e => updateGoal('breakPerMin', e.target.value));

document.getElementById('after-da-notes').addEventListener('input', e => updateAfterDaNotes(e.target.value));

document.getElementById('edit-cancel').addEventListener('click', closeEditModal);
document.getElementById('edit-save').addEventListener('click', saveEdit);
document.getElementById('edit-delete').addEventListener('click', deleteSession);

document.querySelectorAll('#difficulty-picker button').forEach(btn => {
  btn.addEventListener('click', () => {
    const v = parseInt(btn.getAttribute('data-diff'));
    selectedDifficulty = selectedDifficulty === v ? null : v;
    updateDifficultyPicker();
  });
});

document.getElementById('wake-modal-save').addEventListener('click', () => {
  const val = document.getElementById('wake-modal-input').value;
  if (val) {
    const day = getDay(todayKey());
    day.wakeTime = val;
    saveData(data);
  }
  document.getElementById('wake-modal').classList.remove('show');
  render();
});

document.querySelectorAll('[data-print]').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.closest('details').open = false;
    printRange(btn.getAttribute('data-print'));
  });
});

document.getElementById('export-btn').addEventListener('click', exportJson);
document.getElementById('import-btn').addEventListener('click', () => document.getElementById('import-file').click());
document.getElementById('import-file').addEventListener('change', e => {
  if (e.target.files[0]) importJson(e.target.files[0]);
});
document.getElementById('clear-btn').addEventListener('click', clearAll);

document.addEventListener('click', (e) => {
  document.querySelectorAll('details.print-menu').forEach(d => {
    if (!d.contains(e.target)) d.open = false;
  });
});

checkWakePrompt();
render();

setInterval(() => {
  if (currentView === 'day') {
    if (findActiveAnywhere() && !activeTimerInterval) renderDay();
  }
}, 30000);
</script>
